<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ocean Coffee - Brasil</title>
  <link class="novo" rel="icon" href="IMG/Loginho2.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#005f73">

  <script src="JS/theme-applier.js"></script>
  <link rel="stylesheet" href="CSS/dark-mode.css">
  <link rel="stylesheet" href="CSS/styles.css">
  <link rel="stylesheet" href="CSS/api.css">
  <link rel="stylesheet" href="CSS/curva.css"> 
  <link rel="stylesheet" href="CSS/responsive.css"> 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* FORÇAR POPUP NO TOPO E CENTRO */
    #pwa-popup {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background-color: rgba(0, 0, 0, 0.85) !important;
      display: none; /* JS controla a exibição */
      justify-content: center !important;
      align-items: center !important;
      z-index: 9999999 !important; /* Na frente de TUDO */
    }

    .pwa-popup-content {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
      position: relative;
      max-width: 85%;
      width: 350px;
      animation: zoomIn 0.3s ease-out;
    }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .pwa-popup-content h3 {
      color: #005f73;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .pwa-popup-content p {
      color: #333;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .close-pwa {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      font-size: 24px;
      color: #999;
      cursor: pointer;
    }

    .pwa-btn-main {
      background-color: #005f73;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      width: 100%;
      font-weight: bold;
      margin-bottom: 10px;
      cursor: pointer;
    }

    #btnInstalar {
      background-color: #e9d8a6;
      color: #005f73;
    }

    #fundo {
      height: 100vh;
      background-image: url("IMG/Fundo.png");
      background-size: cover;
    }
  </style>
</head>

<body>

  <div id="pwa-popup">
    <div class="pwa-popup-content">
      <button class="close-pwa" id="close-pwa-popup">&times;</button>
      <img src="IMG/Loginho2.png" alt="Logo" style="width: 60px; margin-bottom: 15px;">
      <h3>Fique por dentro!</h3>
      <p>Ative as notificações para receber alertas de novos produtos e ofertas exclusivas.</p>
      
      <button id="btnNotificacao" class="pwa-btn-main">🔔 ATIVAR NOTIFICAÇÕES</button>
      <button id="btnInstalar" class="pwa-btn-main" style="display: none;">📲 INSTALAR APLICATIVO</button>
    </div>
  </div>

  <header class="navbar">
    <div class="navbar-left">
      <a href="Market.html"><i class="fas fa-store"></i></a>
      <a href="https://portal.cocatrel.com.br/DPmercadoCafe.aspx">
        <img class="cocatrel" src="IMG/cocatrel.png" alt="Cocatrel" style="height: 30px; margin-left: 10px;">
      </a>
    </div>
    <nav class="navbar-center">
      <a href="#NossoCafe">Nosso Café</a>
      <a href="#Serviços">Serviços</a>
      <a href="#Sobre">Sobre</a>
      <a href="Login.html">Login</a>
    </nav>
    <div class="navbar-right" id="weather-toggle">
      <i class="fa-solid fa-cloud-sun"></i>
    </div>
  </header>

  <header class="mobile-header">
      <a href="index.html"><img src="IMG/Loginho2.png" alt="Logo" class="logo-img"></a>
      <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>
  </header>

  <div class="nav-overlay" id="nav-overlay"></div>
  <nav class="mobile-nav" id="mobile-nav">
      <ul class="mobile-nav-links">
          <li><a href="#NossoCafe">Nosso Café</a></li>
          <li><a href="#Serviços">Serviços</a></li>
          <li><a href="Market.html">Loja</a></li>
          <li><a href="Login.html">Login</a></li>
      </ul>
  </nav>

  <section class="fundo" id="fundo">
    <div class="Primeirasessao">
      <div class="sessao">
        <img class="Logo" src="IMG/Logo.png">
        <p class="texto1">Comece seu dia <br><span class="cor"> Com café </span></p>
      </div>
      <img class="Pacote" src="IMG/Imagempacote (1).png" alt="Pacote">
    </div>
  </section>

  <script>
    let deferredPrompt;
    const popup = document.getElementById('pwa-popup');
    const btnInstalar = document.getElementById('btnInstalar');
    const btnNotif = document.getElementById('btnNotificacao');
    const btnClose = document.getElementById('close-pwa-popup');

    // 1. Mostrar o Pop-up assim que entra (com 1.5s de delay para carregar tudo)
    window.addEventListener('load', () => {
      setTimeout(() => {
        // Se a permissão não foi dada, mostra o popup
        if (Notification.permission !== 'granted') {
          popup.style.display = 'flex';
        }
      }, 1500);
    });

    // 2. Lógica para Instalação (PWA)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btnInstalar.style.display = 'block'; // Mostra botão de instalar se disponível
      popup.style.display = 'flex';
    });

    // 3. Clique em Ativar Notificações
    btnNotif.addEventListener('click', () => {
      Notification.requestPermission().then(permission => {
        if (permission === 'granted') {
          alert("Notificações ativadas com sucesso!");
          btnNotif.style.display = 'none';
          // Se não tiver botão de instalar, fecha o popup
          if (btnInstalar.style.display === 'none') {
            popup.style.display = 'none';
          }
        }
      });
    });

    // 4. Clique em Instalar Aplicativo
    btnInstalar.addEventListener('click', () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            popup.style.display = 'none';
          }
          deferredPrompt = null;
        });
      }
    });

    // 5. Botão de Fechar
    btnClose.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    // Registrar Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="JS/dolar-api.js" defer></script>
  <script src="JS/weather-api.js" defer></script>
</body>
</html>
